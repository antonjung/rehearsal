<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CueLine Admin</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0e17;
        color: #e8e6f0;
        min-height: 100vh;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
      h1 { font-size: 1.4rem; margin: 0 0 4px; }
      .sub { color: #9d9bb0; font-size: 0.85rem; margin: 0 0 24px; }
      .card {
        background: #1a1825;
        border: 1px solid #2e2b40;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid #2e2b40;
        background: #232032;
        color: #e8e6f0;
        padding: 8px 14px;
      }
      button:hover { border-color: #7c3aed; }
      button.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.icon-btn {
        padding: 6px 8px;
        line-height: 1;
        font-size: 1rem;
      }
      input {
        font: inherit;
        background: #0f0e17;
        border: 1px solid #2e2b40;
        border-radius: 8px;
        color: #e8e6f0;
        padding: 8px 10px;
        width: 100%;
      }
      label { display: block; font-size: 0.8rem; color: #9d9bb0; margin: 10px 0 4px; }
      .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #2e2b40; }
      th { color: #9d9bb0; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; position: sticky; top: 0; background: #1a1825; }
      button.sort-th {
        background: none;
        border: none;
        padding: 0;
        color: inherit;
        font: inherit;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        cursor: pointer;
      }
      button.sort-th:hover { color: #e8e6f0; border: none; }
      .muted { color: #9d9bb0; }
      .err { color: #f87171; font-size: 0.85rem; }
      .ok { color: #a78bfa; font-size: 0.85rem; }
      #signedOut { text-align: center; padding: 60px 0; }
      #app { display: none; }
      .library-scroll { max-height: 400px; overflow-y: auto; }
      .version { text-align: center; color: #6b6880; font-size: 0.75rem; margin-top: 24px; }
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 10;
      }
      .modal-overlay.open { display: flex; }
      .modal-box { max-width: 420px; width: 100%; }
    </style>
    <script type="module" crossorigin src="/rehearsal/assets/admin-DdAOzBF6.js"></script>
    <link rel="modulepreload" crossorigin href="/rehearsal/assets/preload-helper-Bhcatj8M.js">
    <link rel="modulepreload" crossorigin href="/rehearsal/assets/pdfExtract-VtSmhgrr.js">
  <link rel="manifest" href="/rehearsal/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/rehearsal/registerSW.js"></script></head>
  <body>
    <div class="wrap">
      <h1>CueLine Admin</h1>
      <p class="sub">
        Manage the shared script library — not linked from the main app.
        <a href="./" style="color:#a78bfa;">Open CueLine app →</a>
      </p>

      <div id="signedOut" class="card">
        <p class="muted">Sign in to manage the shared library.</p>
        <button id="signInBtn" class="primary">Sign in with Google</button>
        <p id="signInError" class="err"></p>
      </div>

      <div id="app">
        <div class="card row">
          <div>
            <div class="muted" style="font-size:0.8rem;">Signed in as</div>
            <div id="userEmail"></div>
          </div>
          <div class="row" style="gap:6px;">
            <button id="copyUidBtn" class="icon-btn" title="Copy Google UID">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
            <button id="signOutBtn">Sign out</button>
          </div>
        </div>

        <div class="card">
          <div class="row" style="margin-bottom:8px;">
            <p style="margin:0;"><strong>Shared library</strong></p>
            <button id="refreshBtn">Refresh</button>
          </div>
          <input id="orgFilter" type="text" placeholder="Filter by organisation…" style="margin-bottom:10px;" />
          <p id="listStatus" class="muted"></p>
          <div class="library-scroll">
            <table id="libraryTable" style="display:none;">
              <thead>
                <tr>
                  <th><button class="sort-th" data-sort="name">Name</button></th>
                  <th>Organisation</th>
                  <th><button class="sort-th" data-sort="createdAt">Uploaded</button></th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="libraryBody"></tbody>
            </table>
          </div>
        </div>

        <button id="openUploadBtn" class="primary" style="width:100%;">+ Upload a script</button>
      </div>

      <p class="version">v<span id="versionText"></span></p>
    </div>

    <div id="uploadModalOverlay" class="modal-overlay">
      <div class="card modal-box">
        <p style="margin-top:0;"><strong>Upload a script</strong></p>
        <label for="uploadFile">Script file (.txt or .pdf)</label>
        <input id="uploadFile" type="file" accept=".txt,.pdf" />
        <label for="uploadOrg">Organisation</label>
        <input id="uploadOrg" type="text" placeholder="Organisation name" />
        <label for="uploadPin">PIN</label>
        <input id="uploadPin" type="text" inputmode="numeric" placeholder="PIN" />
        <div class="row" style="margin-top:12px;">
          <button id="uploadBtn" class="primary" style="flex:1;">Upload</button>
          <button id="closeUploadBtn">Cancel</button>
        </div>
        <p id="uploadStatus" style="margin-bottom:0;"></p>
      </div>
    </div>

  </body>
</html>
