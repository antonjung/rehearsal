<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CueLine Admin</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0e17;
        color: #e8e6f0;
        min-height: 100vh;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
      h1 { font-size: 1.4rem; margin: 0 0 4px; }
      .sub { color: #9d9bb0; font-size: 0.85rem; margin: 0 0 24px; }
      .card {
        background: #1a1825;
        border: 1px solid #2e2b40;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid #2e2b40;
        background: #232032;
        color: #e8e6f0;
        padding: 8px 14px;
      }
      button:hover { border-color: #7c3aed; }
      button.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      input {
        font: inherit;
        background: #0f0e17;
        border: 1px solid #2e2b40;
        border-radius: 8px;
        color: #e8e6f0;
        padding: 8px 10px;
        width: 100%;
      }
      label { display: block; font-size: 0.8rem; color: #9d9bb0; margin: 10px 0 4px; }
      .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
      .uid-box {
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        background: #0f0e17;
        border: 1px solid #2e2b40;
        border-radius: 8px;
        padding: 8px 10px;
        word-break: break-all;
        user-select: all;
      }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #2e2b40; }
      th { color: #9d9bb0; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
      .muted { color: #9d9bb0; }
      .err { color: #f87171; font-size: 0.85rem; }
      .ok { color: #a78bfa; font-size: 0.85rem; }
      #signedOut { text-align: center; padding: 60px 0; }
      #app { display: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>CueLine Admin</h1>
      <p class="sub">Manage the shared script library — not linked from the main app.</p>

      <div id="signedOut" class="card">
        <p class="muted">Sign in to manage the shared library.</p>
        <button id="signInBtn" class="primary">Sign in with Google</button>
        <p id="signInError" class="err"></p>
      </div>

      <div id="app">
        <div class="card row">
          <div>
            <div class="muted" style="font-size:0.8rem;">Signed in as</div>
            <div id="userEmail"></div>
          </div>
          <button id="signOutBtn">Sign out</button>
        </div>

        <div class="card">
          <div class="muted" style="font-size:0.8rem; margin-bottom:4px;">Your Google UID (send this once to gate delete access)</div>
          <div id="uidBox" class="uid-box"></div>
        </div>

        <div class="card">
          <p style="margin-top:0;"><strong>Upload a script</strong></p>
          <label for="uploadFile">Script file (.txt or .pdf)</label>
          <input id="uploadFile" type="file" accept=".txt,.pdf" />
          <label for="uploadOrg">Organisation</label>
          <input id="uploadOrg" type="text" placeholder="Organisation name" />
          <label for="uploadPin">PIN</label>
          <input id="uploadPin" type="text" inputmode="numeric" placeholder="PIN" />
          <div style="margin-top:12px;">
            <button id="uploadBtn" class="primary">Upload</button>
          </div>
          <p id="uploadStatus" style="margin-bottom:0;"></p>
        </div>

        <div class="card">
          <div class="row" style="margin-bottom:8px;">
            <p style="margin:0;"><strong>Shared library</strong></p>
            <button id="refreshBtn">Refresh</button>
          </div>
          <p id="listStatus" class="muted"></p>
          <table id="libraryTable" style="display:none;">
            <thead>
              <tr><th>Name</th><th>Organisation</th><th>Uploaded</th><th></th></tr>
            </thead>
            <tbody id="libraryBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script type="module" src="/src/admin/main.ts"></script>
  </body>
</html>
